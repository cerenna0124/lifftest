<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LIFF Login Test</title>
    <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <!-- Add Bootstrap Icons stylesheet -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.8.1/font/bootstrap-icons.css">
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background: #f0f2f5;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
        }

        /* Initial loading state styles */
        #initial-loading {
            text-align: center;
            color: #333;
        }

        /* Glass container for the result page */
        .glass-container {
            background: rgba(255, 255, 255, 0.25);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border-radius: 20px;
            border: 1px solid rgba(255, 255, 255, 0.18);
            padding: 30px;
            box-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
            text-align: center;
        }

        h1 {
            color: #333;
            margin-bottom: 20px;
        }

        .uid-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .uid-label {
            margin-right: 10px;
            font-size: 16px;
            color: #333;
        }

        #uid-textbox {
            padding: 10px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background-color: #f8f8f8;
            color: #333;
            font-size: 16px;
            width: 280px; /* Adjusted width */
            text-align: left; /* Align text to the left now */
            pointer-events: none; 
        }

        #copy-button {
            margin-left: 10px;
            padding: 10px 15px;
            border-radius: 8px;
            border: 1px solid #ccc; /* Added a subtle border to match textbox */
            background-color: #f0f0f0;
            color: #333;
            font-size: 18px; /* Increased font size for icon */
            cursor: pointer;
            transition: background-color 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #copy-button:hover {
            background-color: #c0c0c0;
        }
    </style>
</head>
<body>

    <!-- Initial loading message -->
    <div id="initial-loading">
        <h1>LIFF Login Test</h1>
        <p id="loading-message">Page loaded. Starting script...</p>
    </div>

    <!-- Hidden container for the result, shown after login -->
    <div class="glass-container" id="uid-container" style="display: none;">
        <h1>LIFF Login Test</h1>
        <div class="uid-wrapper">
            <span class="uid-label">Your LINE UID is:</span>
            <input type="text" id="uid-textbox" readonly>
            <button id="copy-button" onclick="copyUid()" title="Copy UID">
                <i class="bi bi-copy"></i>
            </button>
        </div>
    </div>

    <script>
        async function main() {
            const loadingMessage = document.getElementById("loading-message");
            try {
                loadingMessage.textContent = "Initializing LIFF...";
                await liff.init({ liffId: "2010674273-9rT5RXzN" });

                loadingMessage.textContent = "Checking login status...";
                if (!liff.isLoggedIn()) {
                    loadingMessage.textContent = "Not logged in. Redirecting to login...";
                    liff.login();
                } else {
                    loadingMessage.textContent = "Logged in. Fetching profile...";
                    const profile = await liff.getProfile();
                    const userId = profile.userId;
                    
                    loadingMessage.textContent = "Profile fetched successfully.";
                    
                    document.getElementById("uid-textbox").value = userId;

                    document.getElementById("initial-loading").style.display = 'none';
                    document.getElementById("uid-container").style.display = 'block';
                }
            } catch (err) {
                console.error(err);
                loadingMessage.textContent = `Error: ${err.code} - ${err.message}`;
            }
        }

        function copyUid() {
            const textbox = document.getElementById("uid-textbox");
            navigator.clipboard.writeText(textbox.value).then(() => {
                const button = document.getElementById("copy-button");
                const originalIcon = button.innerHTML;
                button.innerHTML = 'Copied!';
                button.disabled = true; // Disable button after copying
                setTimeout(() => {
                    button.innerHTML = originalIcon;
                    button.disabled = false;
                }, 2000);
            }).catch(err => {
                console.error('Failed to copy: ', err);
            });
        }

        main();
    </script>
</body>
</html>
